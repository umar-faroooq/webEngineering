<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mid Assignment</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light p-4">

<div class="container">

<h2 class="mb-4 text-center">JavaScript Mid Assignment</h2>

<!-- Buttons -->
<div class="mb-3 text-center">

<button class="btn btn-primary m-1" onclick="runES6()">ES6 Demo</button>
<button class="btn btn-success m-1" onclick="runJSON()">JSON Demo</button>
<button class="btn btn-info m-1" onclick="fetchPosts()">Fetch Posts</button>
<button class="btn btn-warning m-1" onclick="fetchUsersList()">Users List</button>
<button class="btn btn-secondary m-1" onclick="fetchUsersTable()">Users Table</button>
<button class="btn btn-danger m-1" onclick="fetchError()">Error Demo</button>

</div>

<!-- Output -->
<div id="output" class="card p-3 mb-3"></div>

<!-- Table -->
<table class="table table-bordered table-striped d-none" id="userTable">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>City</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
