<!DOCTYPE html>
<html>
<head>
    <title>My Local Storage Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>My Notes</h1>
        
        <div class="input-section">
            <textarea id="noteInput" placeholder="Write a new note here..." rows="4"></textarea>
            <br>
            <button id="addBtn">Add Note</button>
        </div>

        <!-- We'll inject our sticky notes in here -->
        <div id="notesContainer" class="notes-grid">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
