<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async & Error Handling - Task 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Task 4: Error Handling</h1>
        <p>We are making two internet requests. One works perfectly, and one is intentionally broken so we can catch the error!</p>
        
        <div class="test-section">
            <h3>Successful Request</h3>
            <div id="success-output" class="output-box success">
                Waiting for valid data...
            </div>
        </div>

        <div class="test-section">
            <h3>Failed Request</h3>
            <div id="error-output" class="output-box error">
                Waiting to catch the error...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
