<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food API Demo - Ayesha</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 36px;
        }
        
        h1 i {
            color: #ff6b6b;
            margin-right: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        button i {
            font-size: 18px;
        }
        
        #getMeals {
            background: #ff6b6b;
            color: white;
        }
        
        #getCategories {
            background: #4ecdc4;
            color: white;
        }
        
        #getIngredients {
            background: #ff9f1c;
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .loading {
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            margin: 30px 0;
            display: none;
        }
        
        .loading i {
            margin-right: 8px;
        }
        
        .error {
            background: #fee;
            color: #c44;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        
        .error i {
            margin-right: 8px;
        }
        
        .stats {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stats span {
            color: #4a5568;
            font-weight: 500;
        }
        
        .stats i {
            color: #ff6b6b;
            margin-right: 5px;
        }
        
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .toggle-btn {
            background: #e2e8f0;
            color: #4a5568;
            padding: 8px 15px;
        }
        
        .toggle-btn.active {
            background: #ff6b6b;
            color: white;
        }
        
        .data-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .data-card {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }
        
        .data-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #ff6b6b;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .card-header i {
            font-size: 24px;
            color: #ff6b6b;
        }
        
        .card-header h3 {
            color: #333;
            font-size: 18px;
            flex: 1;
        }
        
        .card-body {
            color: #4a5568;
        }
        
        .card-body p {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-body i {
            color: #ff6b6b;
            width: 20px;
            font-size: 14px;
        }
        
        .badge {
            background: #ff6b6b;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            display: inline-block;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        th {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        tr {
            transition: background 0.3s;
            cursor: pointer;
        }
        
        tr:hover {
            background: #fff5f5;
        }
        
        .view-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .view-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        
        /* Modal Styles - Perfectly Centered */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
        
        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            color: #999;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f0f0;
        }
        
        .close:hover {
            color: #ff6b6b;
            background: #ffe5e5;
        }
        
        /* Modal Body Styles */
        #modalBody {
            margin-top: 20px;
        }
        
        #modalBody h2 {
            color: #ff6b6b;
            border-bottom: 2px solid #ff6b6b;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        #modalBody h3 {
            color: #333;
            margin: 15px 0 10px 0;
            font-size: 20px;
        }
        
        #modalBody p {
            margin: 12px 0;
            line-height: 1.6;
            color: #555;
            font-size: 15px;
        }
        
        #modalBody strong {
            color: #ff6b6b;
            font-weight: 600;
        }
        
        /* Scrollbar Styling */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .modal-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .modal-content::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }
        
        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fa-solid fa-utensils"></i> Food API Explorer
        </h1>
        <p class="subtitle">Click on any item to see details</p>
        
        <div class="controls">
            <button id="getMeals">
                <i class="fa-solid fa-pizza-slice"></i> Popular Meals
            </button>
            <button id="getCategories">
                <i class="fa-solid fa-layer-group"></i> Food Categories
            </button>
            <button id="getIngredients">
                <i class="fa-solid fa-carrot"></i> Ingredients
            </button>
        </div>
        
        <div class="view-toggle">
            <button class="toggle-btn active" id="cardView">
                <i class="fa-solid fa-table-cells-large"></i> Card View
            </button>
            <button class="toggle-btn" id="tableView">
                <i class="fa-solid fa-table"></i> Table View
            </button>
        </div>
        
        <div id="loading" class="loading">
            <i class="fa-solid fa-spinner fa-spin"></i> Loading delicious data...
        </div>
        
        <div id="error" class="error">
            <i class="fa-solid fa-circle-exclamation"></i> <span></span>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <span><i class="fa-solid fa-database"></i> <span id="dataType"></span></span>
            <span><i class="fa-solid fa-layer-group"></i> Total: <span id="totalCount"></span></span>
        </div>
        
        <div id="dataDisplay"></div>
    </div>
    
    <!-- Modal Structure -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
